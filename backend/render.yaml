services:
  - type: web
    name: smart-dart-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPERATOR_USERNAME
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
